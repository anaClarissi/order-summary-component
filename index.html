<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="keywords" content="html, css">
  <meta name="author" content="Ana Clarissi">

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Order summary card</title>

  <link rel="stylesheet" href="assets/css/style.css">
  
</head>
<body>

  <main class="container">

    <section class="card">

      <article class="card-img">

        <img src="assets/images/illustration-hero.svg" alt="" class="illutration-img">

      </article>

      <article class="card-info">

        <h1>Order Summary</h1>

        <p>
          You can now listen to millions of songs, audiobooks, and podcasts on any
          device anywhere you like!
        </p>
        
      </article>
      
      <article class="card-assinature">

        <article class="card-assinature-info">

          <img src="assets/images/icon-music.svg" alt="" class="music-icon">

          <article class="card-assinature-txt">

            <p>Annual Plan</p>

            <p>$59.99/year</p>
            
          </article>

        </article>

        <a href="">Change</a>

      </article>

      <article class="card-actions">

        <button>Proceed to Payment</button>

        <button>Cancel Order</button>

      </article>

    </section>
    
  </main>
</body>
</html>
